semver = { workspace = true }
hdrhistogram = { workspace = true }
uuid = { workspace = true }
anyhow = { workspace = true }

streamfy = { workspace = true  }
streamfy-types = { workspace = true }
streamfy-future = { workspace = true, features = ["task", "timer", "subscriber", "fixture"] }

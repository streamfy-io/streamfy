[package]
name = "streamfy-test-derive"
description = "Streamfy Test Derive Macro"
version = "0.0.0"
publish = false
repository.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true


[lib]
proc-macro = true

[dependencies]
syn = { workspace = true, features = ["full"]}
quote = { workspace = true }
proc-macro2 = { workspace = true }
serde_json = { workspace = true }
inflections = "1.1"
streamfy-test-util = { workspace = true }
rand = { workspace = true }


[dev-dependencies]
trybuild = { workspace = true }
streamfy-future = { workspace = true, features = ["task", "timer", "subscriber", "fixture"] }
inventory = { workspace = true }

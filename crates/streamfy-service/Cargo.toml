[package]
name = "streamfy-service"
description = "Provide TCP service wrapper over streamfy protocol"
version = "0.0.0"
categories = ["encoding"]
publish = false
repository.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true

[lib]
name = "streamfy_service"
path = "src/lib.rs"

[dependencies]
tracing = { workspace = true }
async-trait = { workspace = true }
anyhow = { workspace = true }

# Streamfy dependencies
futures-util = { workspace = true }
streamfy-future = { workspace = true }
streamfy-socket = { workspace = true }
streamfy-protocol = { workspace = true, features = ["derive", "api", "codec"] }
streamfy-types = { workspace = true, features = ["events"] }

[dev-dependencies]
streamfy-future = { workspace = true, features = ["fixture"] }
portpicker = { workspace = true }

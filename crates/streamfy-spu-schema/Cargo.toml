[package]
name = "streamfy-spu-schema"
description = "Streamfy API for SPU"
version.workspace = true
repository.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true

[lib]
name = "streamfy_spu_schema"
path = "src/lib.rs"

[features]
file = ["streamfy-future","streamfy-protocol/store"]

[dependencies]
bytes = { workspace = true }
derive_builder = { workspace = true }
educe = { version = "0.6.0", features = ["Debug"] }
flate2 = { workspace = true  }
serde = { workspace = true, features = ['derive'] }
static_assertions = { workspace = true }
tracing = { workspace = true }

streamfy-types = { workspace = true }
streamfy-future = { workspace = true, optional = true }
# Streamfy dependencies
streamfy-protocol = { workspace = true,  features = [
    "api",
    "record",
    "link"
] }
streamfy-smartmodule = { workspace = true }


[dev-dependencies]
futures-util = { workspace = true }
streamfy-socket = { workspace = true, features = ["file"] }
streamfy-future = { workspace = true, features = ["fixture", "fs"] }
flv-util = { workspace = true, features = ["fixture"] }
streamfy-protocol = { workspace = true,  features = [
    "compress"
] }

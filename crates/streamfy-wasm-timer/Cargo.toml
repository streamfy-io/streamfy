[package]
name = "streamfy-wasm-timer"
version = "0.2.5"
edition = "2018"
authors = ["Streamfy Contributors <team@streamfy.io>"]
license = "MIT"
repository = "https://github.com/streamfy-io/streamfy"
description = "Abstraction over std::time::Instant and futures-timer that works on WASM"
publish = false

[lib]
name = "streamfy_wasm_timer"
path = "src/lib.rs"

[dependencies]
futures = "0.3.1"
parking_lot = "0.11"
pin-utils = "0.1.0"

[target.'cfg(all(target_arch = "wasm32", target_os = "unknown"))'.dependencies]
js-sys = "0.3.31"
parking_lot = { version = "0.11", features = ["wasm-bindgen"] }
wasm-bindgen = "0.2.37"
wasm-bindgen-futures = "0.4.4"
web-sys = { version = "0.3.31", features = ["Performance", "Window"] }

[package]
name = "streamfy-smartengine"
description = "The official Streamfy SmartEngine"
keywords = ["streaming", "stream", "queue"]
categories = ["encoding", "api-bindings"]
version.workspace = true
repository.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[features]
engine = ["wasmtime", "wasi-common"]
transformation = ["serde_json", "serde_yaml", "humantime-serde"]
default = ["engine"]


[dependencies]
tracing = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
schemars = { workspace = true }
serde = { workspace = true, features = ['derive'] }
serde_json = { workspace = true, optional = true }
serde_yaml = { workspace = true, default-features = false, optional = true }
cfg-if = { workspace = true }
derive_builder = { workspace = true }
wasi-common = { workspace = true, optional = true }
wasmtime = { workspace = true, optional = true }
humantime-serde = { workspace = true, optional = true }

streamfy-future = { workspace = true, default-features = false }
streamfy-protocol = { workspace = true, features = ["record"] }
streamfy-smartmodule = { workspace = true, default-features = false }

[dev-dependencies]
streamfy-future = { workspace = true, default-features = false, features = [
    "task",
] }
serde_json = { workspace = true }

[package]
name = "streamfy-smartmodule"
description = "Used by Streamfy SmartModule"
categories = ["wasm", "database", "encoding"]
keywords = ["streaming", "stream", "wasm", "streamfy"]
version.workspace = true
repository.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true

[lib]
bench = false
crate-type = ['lib']

[[bench]]
name = "bench"
harness = false

[features]
default = ["smartmodule"]
smartmodule = []

[dependencies]
# Required by streamfy-protocol-derive Decoder expansion
tracing = { workspace = true }
thiserror = { workspace = true }

eyre = { default-features = false, features = ["auto-install"], workspace = true }
streamfy-smartmodule-derive = { workspace = true }
streamfy-protocol = { workspace = true, features = ["link", "types"] }

[dev-dependencies]
criterion = { workspace = true }
trybuild = { workspace = true }

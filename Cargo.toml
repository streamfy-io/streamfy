members = [
    "examples/00-produce",
    "examples/01-produce-key-value",
    "examples/01-produce-batch",
    "examples/02-consume",
    "examples/03-echo",
    "examples/04-admin-watch",
    "examples/partitioning-simple",
    "crates/streamfy",
    "crates/streamfy-auth",
    "crates/streamfy-benchmark",
    "crates/streamfy-channel",
    "crates/streamfy-channel-cli",
    "crates/streamfy-cli",
    "crates/streamfy-cli-common",
    "crates/streamfy-cluster",
    "crates/streamfy-compression",
    "crates/streamfy-controlplane",
    "crates/streamfy-controlplane-metadata",
    "crates/streamfy-artifacts-util",
    "crates/streamfy-hub-protocol",
    "crates/streamfy-extension-common",
    "crates/streamfy-kv-storage",
    "crates/streamfy-package-index",
    "crates/streamfy-protocol",
    "crates/streamfy-protocol-derive",
    "crates/streamfy-run",
    "crates/streamfy-sc",
    "crates/streamfy-sc-schema",
    "crates/streamfy-service",
    "crates/streamfy-smartmodule",
    "crates/streamfy-smartmodule-derive",
    "crates/streamfy-smartengine",
    "crates/streamfy-socket",
    "crates/streamfy-spu",
    "crates/streamfy-spu-schema",
    "crates/streamfy-storage",
    "crates/streamfy-stream-dispatcher",
    "crates/streamfy-stream-model",
    "crates/streamfy-test",
    "crates/streamfy-test-derive",
    "crates/streamfy-test-case-derive",
    "crates/streamfy-test-util",
    "crates/streamfy-types",
    "crates/streamfy-future",
    "crates/streamfy-future/streamfy-future-derive",
    "crates/streamfy-version-manager",
    "crates/streamfy-connector-package",
    "crates/streamfy-connector-deployer",
    "crates/streamfy-connector-common",
    "crates/streamfy-connector-derive",
    "release-tools/check-crate-version",
    "release-tools/check-crate-version/toml-diff",
    "crates/smartmodule-development-kit",
    "crates/cdk",
    "crates/cargo-builder",
    "connector/json-test-connector",
    "connector/sink-test-connector",
]
resolver = "2"

[workspace.package]
version = "0.50.2"
edition = "2024"
license = "Apache-2.0"
repository = "https://github.com/streamfy-io/streamfy"
authors = ["Streamfy Contributors <team@streamfy.io>"]

[workspace.dependencies]
adaptive_backoff = "0.2.1"
anyhow = "1.0.86"
async-channel = { version = "2.3.1",  features = ["std"] }

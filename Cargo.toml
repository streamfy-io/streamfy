streamfy-protocol = { version = "0.50.2", path = "crates/streamfy-protocol" }
streamfy-sc-schema = { version = "0.50.2", path = "crates/streamfy-sc-schema", default-features = false }
streamfy-smartengine = { version = "0.50.2", path = "crates/streamfy-smartengine", default-features = false }
streamfy-smartmodule = { version = "0.50.2", path = "crates/streamfy-smartmodule", default-features = false }
streamfy-smartmodule-derive = { version = "0.50.2", path = "crates/streamfy-smartmodule-derive", default-features = false }
streamfy-socket = { version = "0.50.2", path = "crates/streamfy-socket", default-features = false }
streamfy-spu-schema = { version = "0.50.2", path = "crates/streamfy-spu-schema", default-features = false }

version: "3"
services:
  sc:
    image: streamfy-io/streamfy:stable
    container_name: sc
    hostname: sc
    ports:
      - "9103:9003"
    environment:
      - RUST_LOG=info
    command: "./streamfy-run sc --local /streamfy/metadata"
    volumes:
      - ./streamfy-metadata:/streamfy/metadata
  sc-setup:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sc-setup
    environment:
      - RUST_LOG=info
    entrypoint: >
      /bin/sh -c "
      streamfy profile add docker sc:9003 docker;
      streamfy cluster spu register --id 5001 -p 0.0.0.0:9110 -l spu:9010 --private-server spu:9011;
      exit 0;
      "
    depends_on:
      - sc
  spu:
    image: streamfy-io/streamfy:stable
    container_name: spu
    hostname: spu
    volumes:
      - ./streamfy-data:/streamfy/data
    environment:
      - RUST_LOG=info
    ports:
      - "9110:9010"
      - "9111:9011"
    command: "./streamfy-run spu -i 5001 -p spu:9010 -v spu:9011 --sc-addr sc:9004 --log-base-dir /streamfy/data"
    depends_on:
      - sc
